<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Administra tus tareas">
    <link rel="shortcut icon" href="img/Icono.webp" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Administrador de Tareas</title>
</head>
<body>
    <main>
        <h1>Administrador de Tareas</h1>
        <div class="tareas-box">
            <div class="buscar-add">
                <div class="buscar">
                    <input type="text" name="inpBuscar" id="buscarTareas" placeholder="Buscar Tareas">
                    <button id="buscarLupa" class="lupa"><i class="ri-search-line" title="Buscar"></i></button>
                </div>
                <div class="add">
                    <i class="ri-add-line" title="Agregar Tarea" id="agregarTarea"></i>
                </div>
            </div>
            <div class="tareas"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <!-- LIBRERIA ALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
